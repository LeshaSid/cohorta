services:
  db:
    image: 'postgres:16-alpine'
    container_name: cohorta_db
    environment:
      POSTGRES_USER: 'postgres'
      POSTGRES_PASSWORD: 'postgres'
      POSTGRES_DB: 'cohorta_db'
    ports:
      - '5433:5432'
    volumes:
      - ./data/:/var/lib/postgresql/data
      - ./sql/init_schema.sql:/docker-entrypoint-initdb.d/init_schema.sql
    networks:
      - cohorta_network

  superset:
    image: apache/superset:latest
    container_name: cohorta_superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=your-secret-key-change-me
      - SUPERSET__SQLALCHEMY_DATABASE_URI=postgresql://postgres:postgres@db:5432/superset_meta
    depends_on:
      db:
        condition: service_started
    networks:
      - cohorta_network
    user: "root"
    command: >
      sh -c "
        pip install psycopg2-binary &&
        cp -r /usr/local/lib/python3.10/site-packages/psycopg2* /app/.venv/lib/python3.10/site-packages/ &&
        superset fab create-admin --username admin --firstname admin --lastname User --email admin@example.com --password admin || true &&
        superset db upgrade || true &&
        superset init || true &&
        superset run -p 8088 --host=0.0.0.0 --with-threads
      "

networks:
  cohorta_network:
    driver: bridge